name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch"
        required: true
        default: main

jobs:
  cli-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Start MLflow server (no jupyter)
        run: |
          ./start_services.sh --no-jupyter -d

      - name: Install uv
        run: pipx install uv

      - name: Verify MLflow versions match
        run: ./scripts/check_mlflow_versions.sh

      - name: Install dependencies
        run: |
          uv lock --check
          uv sync --group test

      - name: Run all tests
        run: MLFLOW_TRACKING_URI=http://localhost:8080 uv run pytest

      - name: Stop MLflow server
        run: docker compose down

  jupyter-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Start MLflow server with jupyter and vllm
        run: |
          ./start_services.sh -d --vllm

      - name: Copy test script to Jupyter container
        run: |
          docker cp tests/notebooks/run.py modelplane-jupyter-1:/app/test_notebooks.py

      - name: Execute all notebooks
        run: |
          docker exec modelplane-jupyter-1 uv run python /app/test_notebooks.py

      - name: Stop MLflow server
        run: docker compose down
